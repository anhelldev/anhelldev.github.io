<nav class="navbar">
  <div class="container navbar__inner">
    <a class="navbar__logo" routerLink="/">Anhelldev</a>
    <ul class="navbar__links">
      <li>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
          >Home</a
        >
      </li>
      <li><a routerLink="/experience" routerLinkActive="active">Experience</a></li>
      <li><a routerLink="/projects" routerLinkActive="active">Projects</a></li>
      <li><a routerLink="/" fragment="contact" (click)="closeMenu()">Contact</a></li>
    </ul>
    <button
      class="navbar__menu-btn"
      (click)="toggleMenu()"
      [class.open]="menuOpen()"
      aria-label="Toggle menu"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
  @if (menuOpen()) {
    <ul class="navbar__mobile-links">
      <li><a routerLink="/" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/experience" (click)="closeMenu()">Experience</a></li>
      <li><a routerLink="/projects" (click)="closeMenu()">Projects</a></li>
      <li><a routerLink="/" fragment="contact" (click)="closeMenu()">Contact</a></li>
    </ul>
  }
</nav>
