<section class="work" id="work">
  <div class="container">
    <h2 class="section-title">Latest Work</h2>
    <div class="work__grid">
      @for (project of projects; track project.title) {
        <div class="work__card">
          <div class="work__card-image" [style.background]="project.color"></div>
          <div class="work__card-body">
            <h3 class="work__card-title">{{ project.title }}</h3>
            <p class="work__card-tags">{{ project.tags }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
